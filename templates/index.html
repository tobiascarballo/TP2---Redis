<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mando-Rent | The Mandalorian</title>
    <style>
        /* Estilos generales estilo Star Wars */
        body { 
            background-color: #1a1a1a; 
            color: #ffe81f; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px;
        }
        h1 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        
        td { padding: 8px; font-size: 0.9rem; } /* Reduce un poco el tamaño para que entren más en pantalla */
        
        /* Tabla con diseño */
        table { 
            margin: 0 auto; 
            border-collapse: collapse; 
            width: 90%; 
            max-width: 900px;
            background: #262626; 
            box-shadow: 0 0 20px rgba(255, 232, 31, 0.2);
        }
        th, td { 
            border: 1px solid #444; 
            padding: 15px; 
            text-align: center; 
        }
        th { background-color: #333; color: #ffe81f; text-transform: uppercase; }

        /* Estados con colores */
        .disponible { color: #2ecc71; font-weight: bold; }
        .reservado { color: #f39c12; font-weight: bold; }
        .alquilado { color: #e74c3c; font-weight: bold; }

        /* Botones */
        button { 
            background: #ffe81f; 
            color: #000;
            border: none; 
            padding: 10px 18px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 4px; 
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        button:hover { background: #d4c017; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        
        .btn-pagar { background-color: #2ecc71; color: white; margin-left: 5px; }
        .btn-pagar:hover { background-color: #27ae60; }

        span.check { font-size: 1.2rem; }
    </style>
</head>
<body>

    <h1>The Mandalorian - Alquiler de Capítulos</h1>
    <p>Gestionado con Redis NoSQL</p>

    <div id="contenedor-tabla">
        <p>Cargando sistemas de navegación...</p>
    </div>

    <script>
        // 1. Función para cargar la lista desde el servidor Flask
        function cargarCapitulos() {
            fetch('/capitulos')
                .then(res => res.json())
                .then(data => {
                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre del Capítulo</th>
                                    <th>Estado Actual</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>`;
                    
                    data.forEach(cap => {
                        let botones = '';
                        
                        if (cap.estado === 'disponible') {
                            botones = `<button onclick="reservar('${cap.id}')">Reservar (4 min)</button>`;
                        } else if (cap.estado === 'reservado') {
                            botones = `
                                <button class="btn-pagar" onclick="pagar('${cap.id}')">Confirmar Pago ($500)</button>
                            `;
                        } else {
                            botones = '<span class="check">✅ Alquilado (24hs)</span>';
                        }

                        html += `
                            <tr>
                                <td>${cap.id}</td>
                                <td>${cap.nombre}</td>
                                <td class="${cap.estado}">${cap.estado.toUpperCase()}</td>
                                <td>${botones}</td>
                            </tr>`;
                    });

                    html += `</tbody></table>`;
                    document.getElementById('contenedor-tabla').innerHTML = html;
                })
                .catch(err => {
                    console.error("Error al conectar con la API:", err);
                    document.getElementById('contenedor-tabla').innerHTML = "<p style='color:red'>Error: Asegurate de que el servidor Flask esté corriendo.</p>";
                });
        }

        // 2. Función para Reservar (Punto 2 del TP)
        function reservar(id) {
            fetch(`/reservar/${id}`, { method: 'POST' })
                .then(res => {
                    if (res.ok) {
                        alert("Reserva exitosa. El capítulo quedará bloqueado por 4 minutos.");
                        cargarCapitulos();
                    } else {
                        alert("No se pudo reservar. El capítulo ya no está disponible.");
                    }
                });
        }

        // 3. Función para Pagar (Punto 3 del TP)
        function pagar(id) {
            fetch('/pagar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, precio: 500 })
            })
            .then(res => {
                if (res.ok) {
                    alert("¡Pago confirmado! Disfrutá el capítulo las próximas 24 horas.");
                    cargarCapitulos();
                } else {
                    alert("La reserva expiró. Por favor, volvé a intentar.");
                    cargarCapitulos();
                }
            });
        }

        // Cargar datos al iniciar
        cargarCapitulos();

        // Bonus: Refrescar la tabla cada 10 segundos automáticamente para ver si expiran
        setInterval(cargarCapitulos, 10000);

    </script>
</body>
</html>
